<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <!-- If loaded inside the inquiry form's iframe (post-submit redirect), break out to the full tab -->
  <script>if (window.top !== window.self) { try { window.top.location.replace(window.location.href); } catch (e) {} }</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Call — Trident Films</title>
  <link rel="icon" type="image/png" href="images/logos/TridentFilms-White.png">
  <meta name="description" content="Grab 30 minutes with Joey to talk through your film.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
    }

    [data-theme="dark"] {
      --bg: #0a0a0a;
      --fg: #f5f5f0;
      --fg-muted: #8a8a85;
      --border: rgba(245,245,240,0.06);
      --border-hover: rgba(245,245,240,0.15);
      --surface: rgba(245,245,240,0.03);
      --surface-hover: rgba(245,245,240,0.07);
      --glass-solid: rgba(10,10,10,0.95);
      --btn-bg: #f5f5f0;
      --btn-fg: #0a0a0a;
      --accent: #f5f5f0;
      --grain-opacity: 0.04;
    }

    [data-theme="light"] {
      --bg: #f5f5f0;
      --fg: #0a0a0a;
      --fg-muted: #555550;
      --border: rgba(10,10,10,0.08);
      --border-hover: rgba(10,10,10,0.2);
      --surface: rgba(10,10,10,0.03);
      --surface-hover: rgba(10,10,10,0.06);
      --glass-solid: rgba(245,245,240,0.97);
      --btn-bg: #0a0a0a;
      --btn-fg: #f5f5f0;
      --accent: #0a0a0a;
      --grain-opacity: 0.02;
    }

    html, body {
      min-height: 100%;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
    }

    /* GRAIN */
    .grain {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9999;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 180px;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 72px;
      padding: 0 48px;
      display: flex; justify-content: space-between; align-items: center;
      backdrop-filter: blur(20px);
      background: var(--glass-solid);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 72px; width: auto; object-fit: contain; }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--fg-muted); text-decoration: none; transition: color 0.3s;
    }
    .nav-back:hover { color: var(--fg); }
    .nav-back svg { opacity: 0.6; transition: transform 0.3s, opacity 0.3s; }
    .nav-back:hover svg { transform: translateX(-3px); opacity: 1; }
    .theme-toggle {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border-hover);
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--fg); transition: all 0.3s;
    }
    .theme-toggle:hover { border-color: var(--fg); }

    /* PREVIEW RIBBON — remove when wiring the live Cal.com embed */
    .preview-note {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1200;
      font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--fg-muted);
      background: var(--glass-solid); border: 1px solid var(--border-hover);
      padding: 8px 16px; border-radius: 999px; backdrop-filter: blur(20px);
    }

    /* PAGE */
    .page {
      max-width: 1180px; margin: 0 auto;
      padding: 120px 24px 80px;
    }

    .hero { text-align: center; margin-bottom: 56px; }
    .hero .eyebrow {
      font-size: 0.7rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--fg-muted); margin-bottom: 20px;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-weight: 400; font-size: clamp(2.4rem, 5vw, 3.6rem);
      line-height: 1.08; letter-spacing: -0.01em; margin-bottom: 18px;
    }
    .hero h1 em { font-style: italic; }
    .hero p {
      color: var(--fg-muted); font-weight: 300;
      font-size: 1.02rem; max-width: 520px; margin: 0 auto; line-height: 1.6;
    }

    /* BOOKING CARD */
    .booking {
      display: grid; grid-template-columns: 0.82fr 1.18fr;
      border: 1px solid var(--border); border-radius: 18px;
      overflow: hidden; background: var(--surface);
    }

    /* left: host / meeting details */
    .aside { padding: 40px; border-right: 1px solid var(--border); }
    .host { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .host .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--surface-hover); border: 1px solid var(--border-hover);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 1.25rem;
    }
    .host .who .label {
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--fg-muted); margin-bottom: 3px;
    }
    .host .who .name { font-size: 1.05rem; font-weight: 500; }
    .aside h2 {
      font-family: var(--font-display); font-weight: 400;
      font-size: 1.5rem; margin-bottom: 14px;
    }
    .meta { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-top: 22px; }
    .meta li { display: flex; align-items: center; gap: 11px; font-size: 0.9rem; color: var(--fg-muted); }
    .meta li svg { flex-shrink: 0; opacity: 0.75; }
    .aside .blurb { margin-top: 24px; font-size: 0.9rem; line-height: 1.65; color: var(--fg-muted); font-weight: 300; }

    /* right: calendar + slots */
    .scheduler { padding: 36px 40px 40px; display: grid; grid-template-columns: 1fr 240px; gap: 34px; }

    .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .cal-head .month { font-size: 1rem; font-weight: 500; letter-spacing: 0.02em; }
    .cal-nav { display: flex; gap: 8px; }
    .cal-nav button {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--fg); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .cal-nav button:hover:not(:disabled) { border-color: var(--fg); }
    .cal-nav button:disabled { opacity: 0.3; cursor: not-allowed; }

    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
    .weekdays span {
      text-align: center; font-size: 0.6rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--fg-muted); padding: 4px 0;
    }
    .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day {
      aspect-ratio: 1; border: none; background: transparent;
      border-radius: 10px; color: var(--fg); font-family: var(--font-body);
      font-size: 0.9rem; cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center; transition: all 0.18s;
    }
    .day.pad { visibility: hidden; }
    .day.disabled { color: var(--fg-muted); opacity: 0.35; cursor: not-allowed; }
    .day.available { background: var(--surface-hover); font-weight: 500; }
    .day.available:hover { background: var(--btn-bg); color: var(--btn-fg); }
    .day.selected { background: var(--btn-bg) !important; color: var(--btn-fg) !important; font-weight: 600; }
    .day.available::after {
      content: ''; position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%);
      width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: 0.5;
    }
    .day.selected::after { opacity: 0; }

    /* slots */
    .slots { display: flex; flex-direction: column; }
    .slots .slots-label {
      font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--fg-muted); margin-bottom: 14px; min-height: 16px;
    }
    .slots-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 320px; padding-right: 4px; }
    .slot {
      padding: 12px; border: 1px solid var(--border-hover); border-radius: 10px;
      background: transparent; color: var(--fg); font-family: var(--font-body);
      font-size: 0.9rem; font-weight: 500; letter-spacing: 0.02em; cursor: pointer;
      transition: all 0.18s; text-align: center;
    }
    .slot:hover { border-color: var(--fg); }
    .slot.selected { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }
    .slots-empty { font-size: 0.85rem; color: var(--fg-muted); font-weight: 300; line-height: 1.6; }

    /* confirm bar */
    .confirm {
      margin-top: 28px; border-top: 1px solid var(--border);
      padding-top: 24px; display: none; align-items: center; justify-content: space-between; gap: 20px;
    }
    .confirm.show { display: flex; }
    .confirm .summary { font-size: 0.92rem; }
    .confirm .summary strong { font-weight: 600; }
    .confirm .summary span { color: var(--fg-muted); display: block; font-size: 0.8rem; margin-top: 3px; }
    .confirm button {
      padding: 14px 30px; border: none; border-radius: 10px;
      background: var(--btn-bg); color: var(--btn-fg);
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; white-space: nowrap;
      transition: opacity 0.2s;
    }
    .confirm button:hover { opacity: 0.85; }

    /* CAL.COM EMBED */
    .cal-embed {
      width: 100%; min-height: 820px;
      border: none; border-radius: 18px;
      overflow: hidden; background: var(--bg);
    }
    .cal-embed iframe { width: 100% !important; }
    @media (max-width: 700px) {
      .cal-embed { min-height: 1040px; }
    }

    @media (max-width: 900px) {
      .booking { grid-template-columns: 1fr; }
      .aside { border-right: none; border-bottom: 1px solid var(--border); }
      .scheduler { grid-template-columns: 1fr; }
      .slots-list { max-height: none; }
    }
    @media (max-width: 600px) {
      nav, .page { padding-left: 20px; padding-right: 20px; }
      .page { padding-top: 108px; }
      .scheduler, .aside { padding: 28px 22px; }
      .confirm { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>

<body>
  <div class="grain"></div>

  <nav>
    <a href="inquiry.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
    <a href="index.html" class="nav-logo">
      <img src="images/logos/TridentFilms-White.png" alt="Trident Films" id="navLogo">
    </a>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">☀️</button>
  </nav>

  <main class="page">
    <div class="hero">
      <div class="eyebrow">Trident Films</div>
      <h1>Let's talk about <em>your</em> film</h1>
      <p>Pick a time that works for you and grab 30 minutes with Joey. We'll walk through your vision, dates, and how we can bring it to life.</p>
    </div>

    <!-- Cal.com inline embed (live) -->
    <section class="cal-embed" id="cal-inline"></section>
  </main>

  <!--
  ============================================================================
  ONE THING LEFT: paste your public Cal.com event link into CAL_LINK below.
  It looks like "username/slug" (e.g. "danny/30min") — NOT the availability
  page URL. Find it in Cal.com > Event Types > your 30-min event > Copy link.
  ============================================================================
  -->
  <script type="text/javascript">
    // 👇 THE ONLY LINE TO EDIT — your public Cal.com event, as "username/slug"
    const CAL_LINK = "joey-simms-eb7uoi/30min";
  </script>

  <script>
    /* ---------- theme ---------- */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const navLogo = document.getElementById('navLogo');
    function setTheme(t) {
      html.setAttribute('data-theme', t);
      themeToggle.textContent = t === 'dark' ? '☀️' : '🌙';
      navLogo.src = t === 'dark' ? 'images/logos/TridentFilms-White.png' : 'images/logos/TridentFilms-Black.png';
      localStorage.setItem('tf-theme', t);
      // keep the Cal.com widget in sync with the site theme
      if (window.Cal && Cal.ns && Cal.ns.tf) { Cal.ns.tf('ui', { theme: t }); }
    }
    function toggleTheme() { setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    setTheme(localStorage.getItem('tf-theme') || 'dark');

    /* ---------- Cal.com inline embed ---------- */
    (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if (typeof namespace === "string") { cal.ns[namespace] = cal.ns[namespace] || api; p(cal.ns[namespace], ar); p(cal, ["initNamespace", namespace]); } else p(cal, ar); return; } p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");

    const currentTheme = html.getAttribute('data-theme') || 'dark';
    Cal("init", "tf", { origin: "https://cal.com" });
    Cal.ns.tf("inline", {
      elementOrSelector: "#cal-inline",
      config: { layout: "month_view", theme: currentTheme, overlayCalendar: "true" },
      calLink: CAL_LINK
    });
    Cal.ns.tf("ui", {
      theme: currentTheme,
      cssVarsPerTheme: {
        dark: {
          "cal-brand": "#f5f5f0",
          "cal-bg": "#0a0a0a",
          "cal-bg-muted": "#0a0a0a",
          "cal-bg-subtle": "#161616",
          "cal-bg-emphasis": "#202020"
        },
        light: {
          "cal-brand": "#0a0a0a",
          "cal-bg": "#f5f5f0",
          "cal-bg-muted": "#f5f5f0",
          "cal-bg-subtle": "#ecece6",
          "cal-bg-emphasis": "#e4e4dc"
        }
      },
      hideEventTypeDetails: false,
      layout: "month_view"
    });
  </script>
</body>
</html>
