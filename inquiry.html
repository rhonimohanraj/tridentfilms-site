<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquire — Trident Films</title>
  <link rel="icon" type="image/png" href="images/logos/TridentFilms-White.png">
  <meta name="description" content="Tell us about your wedding and let's create something timeless together.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
    }

    [data-theme="dark"] {
      --bg: #0a0a0a;
      --fg: #f5f5f0;
      --fg-muted: #8a8a85;
      --border: rgba(245,245,240,0.06);
      --border-hover: rgba(245,245,240,0.15);
      --glass: rgba(10,10,10,0.6);
      --glass-solid: rgba(10,10,10,0.95);
      --btn-bg: #f5f5f0;
      --btn-fg: #0a0a0a;
      --grain-opacity: 0.04;
    }

    [data-theme="light"] {
      --bg: #f5f5f0;
      --fg: #0a0a0a;
      --fg-muted: #555550;
      --border: rgba(10,10,10,0.08);
      --border-hover: rgba(10,10,10,0.2);
      --glass: rgba(245,245,240,0.7);
      --glass-solid: rgba(245,245,240,0.97);
      --btn-bg: #0a0a0a;
      --btn-fg: #f5f5f0;
      --grain-opacity: 0.02;
    }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* GRAIN */
    .grain {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9999;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 180px;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 72px;
      padding: 0 48px;
      display: flex; justify-content: space-between; align-items: center;
      backdrop-filter: blur(20px);
      background: var(--glass-solid);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 72px; width: auto; object-fit: contain; }

    .nav-back {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--fg-muted); text-decoration: none;
      transition: color 0.3s;
    }
    .nav-back:hover { color: var(--fg); }
    .nav-back svg { opacity: 0.6; transition: transform 0.3s, opacity 0.3s; }
    .nav-back:hover svg { transform: translateX(-3px); opacity: 1; }

    .theme-toggle {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border-hover);
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--fg);
      transition: all 0.3s;
    }
    .theme-toggle:hover { border-color: var(--fg); }

    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-book {
      font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--btn-fg); background: var(--btn-bg);
      padding: 11px 20px; border-radius: 999px; text-decoration: none;
      white-space: nowrap; transition: opacity 0.3s;
    }
    .nav-book:hover { opacity: 0.85; }

    /* FORM FRAME */
    .form-wrap {
      position: fixed;
      top: 72px; left: 0; right: 0; bottom: 0;
    }

    .form-wrap iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .nav-right { gap: 10px; }
      .nav-book { padding: 9px 13px; letter-spacing: 0.1em; font-size: 0.62rem; }
    }
  </style>
</head>

<body>
  <div class="grain"></div>

  <nav>
    <a href="javascript:history.back()" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>

    <a href="index.html" class="nav-logo">
      <img src="images/logos/TridentFilms-White.png" alt="Trident Films" id="navLogo">
    </a>

    <div class="nav-right">
      <a href="book.html" class="nav-book">Book a call</a>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">☀️</button>
    </div>
  </nav>

  <div class="form-wrap">
    <iframe
      src="https://forms.tridenteventgroup.ca/forms/trident-films-inquire-form-6umq6u"
      title="Trident Films Inquiry Form"
      allow="camera; microphone; autoplay; encrypted-media"
      loading="eager">
    </iframe>
  </div>

  <script>
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const navLogo = document.getElementById('navLogo');

    function setTheme(t) {
      html.setAttribute('data-theme', t);
      themeToggle.textContent = t === 'dark' ? '☀️' : '🌙';
      navLogo.src = t === 'dark' ? 'images/logos/TridentFilms-White.png' : 'images/logos/TridentFilms-Black.png';
      localStorage.setItem('tf-theme', t);
    }

    function toggleTheme() {
      setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    setTheme(localStorage.getItem('tf-theme') || 'dark');
  </script>
</body>
</html>
